---
layout: default
---

<main class="main-content">
  <div class="container">
    <div class="content-page{% if page.section %} content-page--{{ page.section }}{% endif %}">
      {% unless page.hide_page_title %}
        <h1>{{ page.heading | default: page.title }}</h1>
      {% endunless %}
      {{ content }}
    </div>
  </div>
</main>
