title: Geometry of Flows
subtitle: A Meeting on Geometry, Dynamics, and Turbulence
initiative: Simons Initiative on the Geometry of Flows
dates: June 15-19, 2026
description: >-
  An interdisciplinary meeting on how physical flows shape mesoscale structures,
  with particular emphasis on boundaries, surfaces, interfaces, and turbulence.
registration:
  url: https://forms.gle/SeWzs8KCBzzWSVi5A
  deadline: As soon as possible
contacts:
  - name: Drummond Fielding
    email: drummondfielding@nyu.edu
    phone: 973-634-2354
    phone_href: "+19736342354"
  - name: Tim Johnston
    role: CCPP administrator
    email: tmj222@nyu.edu
venue:
  room: Room 940
  building: NYU Department of Physics
  address: 726 Broadway, Manhattan, New York, NY 10003
  note: This is the NYU Physics building in Manhattan, not 726 Broadway in Brooklyn.
  entry: Visitors must bring photo ID for building entry.
poster:
  src: /images/GoF2026NYU/GOF_JuneNYU.webp
  download: /images/GoF2026NYU/GOF_JuneNYU.png
  alt: Poster for Geometry of Flows, a meeting on geometry, dynamics, and turbulence at NYU on June 15-16, 2026.
conference:
  dates: Monday-Tuesday, June 15-16
  description: >-
    The first two days are an invited-speaker conference with opening remarks,
    an introduction to the collaboration, eleven contributed talks, and
    substantial time for discussion. Speakers should aim for 25-30 minutes,
    followed by 15-20 minutes of discussion.
workshop:
  dates: Wednesday-Friday, June 17-19
  description: >-
    The conference is followed by a smaller working session for collaboration
    members and interested visitors. Conference participants are welcome to join
    for any portion of the workshop. Talks will take place in Room 940, with
    breakout discussions in Rooms 901 and TBD and available visitor offices.
