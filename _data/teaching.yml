        term: Spring 2025
        description: Graduate-level course covering galaxy formation, structure, dynamics, and evolution.
  - institution: University of California, Berkeley
    role: Graduate Student Instructor
    courses:
      - title: "Astronomy C12: The Planets"
        description: An introduction to the study of the solar system with emphasis on the discoveries from space exploration. Topics include the origin of the solar system, planetary atmospheres, surfaces and interiors, comets and asteroids, and the search for life in the solar system.
      - title: "Astronomy 7A: Introduction to Astrophysics"
        description: An introduction to astrophysics including stellar structure and evolution, galaxies, and cosmology for students majoring in physical sciences.
