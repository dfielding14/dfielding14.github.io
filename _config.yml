# Site Settings
title: Drummond B. Fielding
email: dbf233@nyu.edu
description: Computational Astrophysicist | Assistant Professor at New York University
baseurl: ""
url: "https://dfielding14.github.io"

# Build settings
markdown: kramdown
highlighter: rouge

# Exclude files
exclude:
  - .ruby-version
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - ANALYTICS_QUICKSTART.md
  - ANALYTICS_SETUP.md
  - dfielding14.github.io_old/
  - scripts/
  - solfege-flight/README.md

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Default layout
defaults:
  - scope:
      path: ""
    values:
      layout: "page"
