{% assign profile = site.data.site %}
{% assign canonical_url = page.url | replace: 'index.html', '' | absolute_url %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="canonical" href="{{ canonical_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/new-style.css' | relative_url }}">
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="icon" type="image/x-icon" href="{{ '/favicon.svg' | relative_url }}">
<script defer src="{{ '/assets/js/site.js' | relative_url }}"></script>
{% if profile.analytics.umami_website_id %}
<script defer src="https://cloud.umami.is/script.js" data-website-id="{{ profile.analytics.umami_website_id }}"></script>
{% endif %}
{% if profile.analytics.clarity_project_id %}
<script type="text/javascript">
  (function(c,l,a,r,i,t,y){
      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
      t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
      y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
  })(window, document, "clarity", "script", "{{ profile.analytics.clarity_project_id }}");
</script>
{% endif %}
